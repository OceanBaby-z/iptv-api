name: Update schedule

on:
  workflow_dispatch: # 支持手动点击运行
  schedule:
    - cron: '0 22 * * *' # 每天国际标准时间 22:00 (北京时间早上 6:00) 自动触发

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v3

      - name: 2. 安装配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pipenv'

      - name: 3. 安装系统核心依赖 (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 4. 安装 Python 依赖管理工具
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: 5. 一键部署并强开 Cloudflare WARP IPv6 网络隧道
        run: |
          echo "========= 开始安装 Cloudflare WARP ========="
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          
          echo "========= 开始配置 WARP ========="
          sudo systemctl enable --now warp-svc.service
          sleep 2
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          warp-cli --accept-tos connect
          sleep 5
          
          echo "========= 验证 IPv6 ========="
          export http_proxy="http://127.0.0.1:40000"
          export https_proxy="http://127.0.0.1:40000"
          curl -6 --connect-timeout 10 https://6.ipw.cn || echo "⚠️ WARP IPv6 建立失败，但将尝试强制继续..."

      - name: 6. 统一环境配置与核心打捞
        run: |
          # 1. 升级工具并直接安装全套依赖到当前环境
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install requests tqdm openpyxl flask markupsafe==2.0.1 pytz
          
          # 2. 彻底清洗可能导致路径污染的临时缓存
          git checkout -- *.py || true
          rm -rf __pycache__ data user_result.txt output || true
          find . -name "*.pyc" -delete || true
          
          # 3. 注入系统路径环境变量，强行破解代码内部的路径错位
          export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}"
          export http_proxy="http://127.0.0.1:40000"
          export https_proxy="http://127.0.0.1:40000"
          
          # 4. 彻底抛弃 pipenv，直接用原生 python 启动主逻辑
          python main.py
          
      - name: 8. 将生成的专属直播源提交并推送至个人仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Github Action Auto Updated with IPv6" || exit 0
          git push
